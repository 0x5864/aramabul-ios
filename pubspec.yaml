name: aramabul_ios
description: "AramaBul Turkey venue discovery app for iOS."
publish_to: 'none'

version: 1.2.4+56

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  url_launcher: ^6.3.2
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.5.5
  google_fonts: ^8.1.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.0.0
  share_plus: ^13.1.0
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
