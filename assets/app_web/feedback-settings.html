    <link rel="shortcut icon" type="image/png" href="assets/favicon.png?v=20260508b" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>
  <body class="profile-page settings-page feedback-page">
    <div class="texture"></div>

    <header class="global-header-band" role="banner">
      <nav class="topbar global-topbar">
        <a class="brand" href="index.html" aria-label="aramabul">
          <img class="brand-logo" src="assets/logo.png?v=20260508b" alt="aramabul logo" />
          <span class="brand-wordmark"><span class="brand-wordmark-rest">arama</span><span class="brand-wordmark-search">bul</span></span>
        </a>
      </nav>
      <div class="global-topline">
        <div class="global-topline-inner">
          <a href="index.html">Anasayfa</a>
          <span>/</span>
          <a href="profile.html?action=profile">Ayarlar</a>
          <span>/</span>
          <span>Geribildirim</span>
        </div>
      </div>
    </header>

    <form class="header-search profile-hidden-search" action="search.html" method="get" role="search" aria-label="Genel arama">
      <label class="visually-hidden" for="headerSearchInput">Arama ifadesi</label>
      <input id="headerSearchInput" class="header-search-input" type="search" name="mekan" placeholder="Ne bulmamı istersin?" />
      <button class="header-search-btn" type="submit">Bul</button>
    </form>

    <main class="settings-shell">
      <section class="settings-card settings-panel-card settings-feedback-form-card" aria-label="Geribildirim formu">
        <div class="language-card-head">
          <h2>Geribildirim</h2>
          <p>Mesajını konu seçerek hızlıca iletebilirsin.</p>
        </div>
        <form class="settings-feedback-form" id="settingsFeedbackForm" novalidate>
          <div class="settings-feedback-grid">
            <label class="settings-feedback-field" data-span="full">
              <input id="settingsFeedbackName" type="text" name="name" placeholder="Ad Soyad" autocomplete="name" aria-label="Ad Soyad" required />
            </label>
            <label class="settings-feedback-field" data-span="full">
              <input id="settingsFeedbackEmail" type="email" name="email" placeholder="E-posta" autocomplete="email" aria-label="E-posta" required />
            </label>
            <label class="settings-feedback-field" data-span="full">
              <select id="settingsFeedbackSubject" name="subject" aria-label="Konu" required>
                <option value="">Konu</option>
                <option value="destek">Genel Konular</option>
                <option value="ortaklik">İş Birliği</option>
                <option value="icerik">İçerik Düzeltmeleri</option>
              </select>
            </label>
            <label class="settings-feedback-field" data-span="full">
              <div class="settings-feedback-phone-group">
                <span class="settings-feedback-phone-prefix" aria-hidden="true">+90</span>
                <input id="settingsFeedbackPhoneAreaCode" type="text" name="phoneAreaCode" placeholder="Alan kodu" inputmode="numeric" maxlength="3" pattern="\\d{3}" autocomplete="tel-area-code" aria-label="Alan kodu" />
                <input id="settingsFeedbackPhoneNumber" type="tel" name="phoneNumber" placeholder="Telefon numarası" inputmode="numeric" maxlength="7" pattern="\\d{7}" autocomplete="tel-local" aria-label="Telefon numarası" />
              </div>
            </label>
            <label class="settings-feedback-field" data-span="full">
              <textarea id="settingsFeedbackMessage" name="message" rows="6" placeholder="Mesaj" aria-label="Mesaj" required></textarea>
            </label>
          </div>
          <div class="settings-feedback-actions">
            <button class="settings-feedback-submit" type="submit">Gönder</button>
          </div>
          <p id="settingsFeedbackStatus" class="settings-signup-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="web-runtime.js?v=20260302-01"></script>
    <script src="header-state.js?v=20260302-01"></script>
    <script src="header-i18n.js?v=20260429-i18n-page-keys-01"></script>
    <script src="header-nav.js?v=20260505-hash-auth-01"></script>
    <script src="header-shell.js?v=20260302-02"></script>
    <script src="header-search-ui.js?v=20260303-04"></script>
    <script src="header-search-data.js?v=20260420-search-db-06"></script>
    <script src="header-search.js?v=20260422-header-no-topbar-01"></script>
    <script src="feedback-settings.js?v=20260307-03"></script>
  </body>
</html>
